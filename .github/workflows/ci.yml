name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "engine/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "engine/**"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check
        working-directory: engine

  clippy:
    name: Clippy Lint
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev libssl-dev protobuf-compiler

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: engine

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev libssl-dev protobuf-compiler

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - run: cargo test --all
        working-directory: engine

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - run: cargo audit
        working-directory: engine

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets in codebase
        run: |
          echo "Scanning for hardcoded secrets, API keys, and credentials..."
          FOUND=0

          # Detect common secret patterns in tracked files
          PATTERNS=(
            'AKIA[0-9A-Z]{16}'                     # AWS Access Key
            'password\s*=\s*"[^"]{8,}"'             # Hardcoded passwords
            'api[_-]?key\s*=\s*"[^"]{16,}"'         # API keys in config
            'BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE KEY' # Private keys
            'ghp_[A-Za-z0-9]{36}'                   # GitHub PAT
            'sk-[A-Za-z0-9]{32,}'                   # OpenAI/Stripe secret keys
          )

          for pattern in "${PATTERNS[@]}"; do
            if git grep -lP "$pattern" -- ':(exclude)*.yml' ':(exclude)*.yaml' ':(exclude)*.md' ':(exclude).github/' 2>/dev/null; then
              echo "::error::Potential secret found matching pattern: $pattern"
              FOUND=1
            fi
          done

          # Check for .env files or credential files that should not be committed
          SENSITIVE_FILES=$(git ls-files | grep -iE '\.(env|pem|key|p12|pfx|jks)$|credentials|secrets\.json' || true)
          if [ -n "$SENSITIVE_FILES" ]; then
            echo "::error::Sensitive files found in repository: $SENSITIVE_FILES"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Secret scan failed — review flagged files above"
            exit 1
          fi

          echo "No secrets detected."
