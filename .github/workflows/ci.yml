name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "engine/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"
      - "cloudflare/**"
  push:
    branches: [main]
    paths:
      - "engine/**"
      - ".github/workflows/ci.yml"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read
  security-events: write

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check
        working-directory: engine

  clippy:
    name: Clippy Lint
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev libssl-dev protobuf-compiler

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: engine

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev libssl-dev protobuf-compiler

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - run: cargo test --all
        working-directory: engine

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo-audit (ignore pre-existing tonic/rustls advisory)
        run: cargo audit --ignore RUSTSEC-2026-0049
        working-directory: engine

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets in codebase
        run: |
          echo "Scanning for hardcoded secrets, API keys, and credentials..."
          FOUND=0

          # Detect common secret patterns in tracked files
          PATTERNS=(
            'AKIA[0-9A-Z]{16}'                     # AWS Access Key
            'password\s*=\s*"[^"]{8,}"'             # Hardcoded passwords
            'BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE KEY' # Private keys
            'ghp_[A-Za-z0-9]{36}'                   # GitHub PAT
            'sk-[A-Za-z0-9]{32,}'                   # OpenAI/Stripe secret keys
          )

          for pattern in "${PATTERNS[@]}"; do
            if git grep -lP "$pattern" -- \
                ':(exclude)*.yml' \
                ':(exclude)*.yaml' \
                ':(exclude)*.md' \
                ':(exclude).github/' \
                ':(exclude)*.example.toml' 2>/dev/null; then
              echo "::error::Potential secret found matching pattern: $pattern"
              FOUND=1
            fi
          done

          # Check for .env files or credential files that should not be committed
          SENSITIVE_FILES=$(git ls-files | grep -iE '\.(env|pem|p12|pfx|jks)$|credentials|secrets\.json' || true)
          if [ -n "$SENSITIVE_FILES" ]; then
            echo "::error::Sensitive files found in repository: $SENSITIVE_FILES"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Secret scan failed — review flagged files above"
            exit 1
          fi

          echo "No secrets detected."

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Semgrep
        run: pip install --disable-pip-version-check semgrep==1.76.0
      - name: Run Semgrep SAST (fail on ERROR severity findings)
        run: semgrep scan --config p/default --severity ERROR --error --sarif --output semgrep.sarif .
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Requires Dependency Graph enabled in repo Settings > Security > Code security.
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, SSPL-1.0
          comment-summary-in-pr: on-failure

  cargo-deny:
    name: License & Advisory Check (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: engine/Cargo.toml
          arguments: --config engine/deny.toml

  iac-scan:
    name: IaC and workflow scanning (Trivy misconfig)
    runs-on: ubuntu-latest
    # Advisory: pre-existing K8s manifest findings may cause failures.
    # Findings are uploaded to GitHub Security tab for triage.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Trivy config scan (fail on HIGH/CRITICAL)
        run: |
          docker run --rm \
            -v "$PWD:/work" -w /work \
            aquasec/trivy:0.51.2 \
            config \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format sarif \
            --output trivy-config.sarif \
            .
      - name: Upload Trivy config SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-config.sarif
