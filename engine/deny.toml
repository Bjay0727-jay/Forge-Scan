# cargo-deny v2 configuration for ForgeScan
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-pc-windows-gnu",
]

# Advisory checking is handled by the separate cargo-audit CI job.
# cargo-deny focuses on license compliance and dependency bans.
[advisories]
# Ignore pre-existing advisories that require major dep upgrades:
# - RUSTSEC-2026-0049: rustls-webpki 0.102.8 (via tonic 0.11 -> rustls 0.22)
ignore = ["RUSTSEC-2026-0049"]

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "BSL-1.0",
    "0BSD",
    "MPL-2.0",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
    "SSPL-1.0",
]
confidence-threshold = 0.8

# ring uses a non-standard license file; clarify for cargo-deny
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
