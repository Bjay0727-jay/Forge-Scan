# ForgeScan Check Definition
# CVE-2024-6387 - OpenSSH regreSSHion Remote Code Execution

id: "FSC-VULN-0008"
name: "OpenSSH regreSSHion - Remote Code Execution"
category: vulnerability
severity: critical
enabled: true
confidence: high

cve_ids:
  - CVE-2024-6387

cwe_ids:
  - CWE-362

description: |
  Signal handler race condition in OpenSSH sshd allows unauthenticated RCE
  on glibc-based Linux systems. Affects OpenSSH 8.5p1 through 9.7p1.

impact: |
  Unauthenticated root access to any exposed SSH server.

detection:
  type: version-match
  cpe: "cpe:2.3:a:openbsd:openssh:*:*:*:*:*:*:*:*"
  affected_versions:
    - ">= 8.5"
    - "< 9.8"
  fixed_versions:
    - ">= 9.8"
  supplemental:
    - type: banner-match
      pattern: "SSH-2\\.0-OpenSSH_(8\\.[5-9]|9\\.[0-7])"

remediation: |
  Upgrade OpenSSH to 9.8p1 or later. If patching is delayed, set
  LoginGraceTime to 0 in sshd_config (creates DoS risk but prevents
  exploitation).

remediation_effort: low

references:
  - "https://nvd.nist.gov/vuln/detail/CVE-2024-6387"
  - "https://www.qualys.com/2024/07/01/cve-2024-6387/regresshion.txt"

tags:
  - rce
  - critical
  - ssh
  - actively-exploited

platforms:
  - linux

nist_controls:
  - "SI-2"
  - "RA-5"

enabled_by_default: true
