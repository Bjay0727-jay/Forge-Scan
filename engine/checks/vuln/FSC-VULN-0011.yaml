# ForgeScan Check Definition
# SSL/TLS Weak Protocol (TLS 1.0/1.1)

id: "FSC-VULN-0011"
name: "SSL/TLS Weak Protocol (TLS 1.0/1.1)"
category: vulnerability
severity: high
enabled: true
confidence: high

description: |
  This service supports TLS 1.0 or TLS 1.1, which are deprecated and have
  known cryptographic weaknesses. The Healthcare Cybersecurity Act requires
  TLS 1.2 minimum.

detection:
  type: tls-check
  check: protocol_version
  condition: supports_tls_1_0_or_1_1
  test_protocols:
    - "TLSv1.0"
    - "TLSv1.1"

remediation: |
  Disable TLS 1.0 and TLS 1.1. Configure minimum TLS version to 1.2.
  TLS 1.3 is recommended.

remediation_effort: medium

tags:
  - ssl
  - tls
  - weak-protocol
  - hipaa

platforms:
  - linux
  - windows
  - macos
  - network_device

nist_controls:
  - "SC-8"
  - "SC-13"

hipaa_refs:
  - "§164.312(e)(1)"
  - "§164.312(e)(2)(ii)"

enabled_by_default: true
