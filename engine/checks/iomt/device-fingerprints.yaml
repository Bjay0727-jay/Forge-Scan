# ============================================================================
# ForgeScan - Medical Device Fingerprint Database
#
# Maps device manufacturers, models, firmware versions, and known CVEs
# to enable accurate IoMT device identification and vulnerability correlation.
#
# Each entry contains:
#   manufacturer: Device manufacturer name
#   product_line: Product family/line
#   models: Specific model numbers and their characteristics
#   protocols: Medical protocols used by this device
#   default_ports: Common ports open on this device
#   known_cves: CVEs affecting specific firmware versions
#   fda_class: FDA device classification (I, II, III)
#   device_class: ForgeScan device classification
#
# Sources: FDA MAUDE, CISA ICS-CERT, NVD, manufacturer disclosures
# ============================================================================

# ── Medical Imaging (PACS / Modalities) ─────────────────────────────

- manufacturer: "Philips"
  product_line: "IntelliSpace PACS"
  device_class: medical_imaging
  fda_class: class_ii
  protocols: [dicom, hl7v2]
  default_ports: [104, 443, 8080]
  banner_keywords: ["philips", "intellispace"]
  known_cves:
    - cve: "CVE-2021-39369"
      affected_firmware: [">= 9.0", "< 9.0.35"]
      severity: high
    - cve: "CVE-2018-5474"
      affected_firmware: ["< 4.4.551"]
      severity: critical

- manufacturer: "GE Healthcare"
  product_line: "Centricity PACS"
  device_class: medical_imaging
  fda_class: class_ii
  protocols: [dicom, hl7v2, fhir]
  default_ports: [104, 443, 8080, 4100]
  banner_keywords: ["ge", "centricity"]

- manufacturer: "Siemens Healthineers"
  product_line: "syngo.plaza"
  device_class: medical_imaging
  fda_class: class_ii
  protocols: [dicom]
  default_ports: [104, 443, 2762]
  banner_keywords: ["siemens", "syngo"]

